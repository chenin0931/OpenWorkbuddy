name: Release macOS

on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  verify-and-package:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.28.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: cargo test --manifest-path apps/native-host/Cargo.toml
      - run: pnpm build:native:universal
      - run: pnpm package:extension
      - run: pnpm build
      - run: pnpm test:e2e
      - name: Build, sign and notarize universal app
        env:
          CSC_LINK: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          WORKBUDDY_UPDATE_FEED_URL: ${{ secrets.WORKBUDDY_UPDATE_FEED_URL }}
        run: |
          if [[ -n "$WORKBUDDY_UPDATE_FEED_URL" ]]; then
            pnpm --filter @onmyworkbuddy/desktop exec electron-builder --mac dmg zip --universal --publish never -c.mac.notarize=true -c.extraMetadata.workbuddyUpdateFeed="$WORKBUDDY_UPDATE_FEED_URL"
          else
            pnpm --filter @onmyworkbuddy/desktop exec electron-builder --mac dmg zip --universal --publish never -c.mac.notarize=true
          fi
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: on-my-workbuddy-macos
          path: |
            outputs/release/*.dmg
            outputs/release/*.zip
            outputs/on-my-workbuddy-chrome.zip

  publish-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: verify-and-package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: on-my-workbuddy-macos
          path: release-artifacts
      - name: Publish tagged release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            release-artifacts/**/*.dmg
            release-artifacts/**/*.zip
